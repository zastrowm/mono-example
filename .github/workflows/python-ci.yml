name: Python CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'strands-py/**'
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
    paths:
      - 'strands-py/**'

concurrency:
  group: python-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: Unit Tests - Python ${{ matrix.python-version }} - ${{ matrix.os-name }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os-name: 'linux'
            python-version: "3.10"
          - os: ubuntu-latest
            os-name: 'linux'
            python-version: "3.11"
          - os: ubuntu-latest
            os-name: 'linux'
            python-version: "3.12"
          - os: ubuntu-latest
            os-name: 'linux'
            python-version: "3.13"
          - os: ubuntu-latest
            os-name: 'linux'
            python-version: "3.14"
          - os: windows-latest
            os-name: 'windows'
            python-version: "3.10"
          - os: windows-latest
            os-name: 'windows'
            python-version: "3.11"
          - os: windows-latest
            os-name: 'windows'
            python-version: "3.12"
          - os: windows-latest
            os-name: 'windows'
            python-version: "3.13"
          - os: windows-latest
            os-name: 'windows'
            python-version: "3.14"
          - os: macos-latest
            os-name: 'macOS'
            python-version: "3.14"
      fail-fast: true
    runs-on: ${{ matrix.os }}
    env:
      LOG_LEVEL: DEBUG
    defaults:
      run:
        working-directory: strands-py
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system audio dependencies (Linux)
        if: matrix.os-name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libasound2-dev

      - name: Install system audio dependencies (macOS)
        if: matrix.os-name == 'macOS'
        run: brew install portaudio

      - name: Install dependencies
        run: pip install --no-cache-dir hatch 'virtualenv<21'

      - name: Run unit tests
        run: hatch test tests --cover

  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: strands-py
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libasound2-dev

      - name: Install dependencies
        run: pip install --no-cache-dir hatch 'virtualenv<21'

      - name: Run lint
        run: hatch fmt --linter --check

  check-api:
    name: Python API Compatibility
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Check API breaking changes
        run: |
          if ! uvx griffe check --search strands-py/src --format github strands --against "main"; then
            echo "Potential API changes detected (review if actually breaking)"
            exit 1
          fi
