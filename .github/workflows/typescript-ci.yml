name: TypeScript CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'strands-ts/**'
      - 'strands-wasm/**'
      - 'strands-py-wasm/**'
      - 'strandly/**'
      - 'wit/**'
      - 'package.json'
      - 'package-lock.json'
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
    paths:
      - 'strands-ts/**'
      - 'strands-wasm/**'
      - 'strands-py-wasm/**'
      - 'strandly/**'
      - 'wit/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: typescript-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:browser:install

      - name: Run unit tests
        run: npm run test:all:coverage

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-${{ matrix.node-version }}-${{ matrix.os }}
          path: ./strands-ts/test/.artifacts/
          include-hidden-files: true
          retention-days: 4
          if-no-files-found: ignore

      - name: Build package
        run: npm run build

      - name: Test packaging
        run: npm run test:package

  lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run lint and type check
        run: npm run check

  security-audit:
    name: NPM Security Audit
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high
