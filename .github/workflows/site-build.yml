name: Site CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'designs/**'
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'designs/**'

concurrency:
  group: site-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'site/.node-version'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

  test:
    name: Test Snippets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'site/.node-version'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run
